name: CI

# Testing Strategy:
# - Tests run on Linux, macOS, and Windows (library must be cross-platform)
# - Go 1.25+ required (matches go.mod requirement)
#
# Trigger Strategy (anti-duplication):
# - push on main: catch direct merges/commits
# - pull_request (all branches): catch PR checks
# - concurrency group: cancels outdated runs on same PR/branch

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Unit tests - Cross-platform
  test:
    name: Test - ${{ matrix.os }} - Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write  # Required for Codecov OIDC (tokenless upload)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25']  # Match go.mod requirement

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with race detector
      shell: bash
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
      uses: codecov/codecov-action@v5
      continue-on-error: true
      with:
        use_oidc: true
        files: ./coverage.txt
        flags: unittests
        name: codecov-uniwidth
        fail_ci_if_error: false

  # Linting
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking during beta development

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  # Fuzz tests
  fuzz:
    name: Fuzz Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Run fuzz tests
      run: |
        go test -fuzz=FuzzRuneWidth -fuzztime=30s
        go test -fuzz=FuzzStringWidth -fuzztime=30s
        go test -fuzz=FuzzStringWidthWithOptions -fuzztime=30s
        go test -fuzz=FuzzIsASCIIOnly -fuzztime=30s
      continue-on-error: true

  # Build verification
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Build
      run: go build -v ./...

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

  # Code formatting
  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "ERROR: The following files are not formatted:"
          gofmt -l .
          echo ""
          echo "Run 'gofmt -w .' to fix formatting issues."
          exit 1
        fi
        echo "All files are properly formatted ✓"